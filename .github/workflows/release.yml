name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Package + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package skills
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          mkdir -p dist
          # full bundle
          zip -r "dist/skills-${TAG}.zip" skills LICENSE README.md
          # per-skill bundles
          for d in skills/*/; do
            name="$(basename "$d")"
            zip -r "dist/${name}-${TAG}.zip" "$d" LICENSE
          done
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: dist/*.zip
          body: |
            Agent skills — install with the [skills CLI](https://github.com/vercel-labs/skills):

            ```bash
            npx skills add LoneExile/skills
            # or a single skill:
            npx skills add LoneExile/skills --skill grok-image
            ```
